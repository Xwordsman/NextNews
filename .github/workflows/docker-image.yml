name: Docker Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image name
        id: image
        shell: bash
        run: |
          echo "name=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Prepare Docker tags
        id: tags
        shell: bash
        env:
          ARCH: ${{ matrix.arch }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          SHORT_SHA: ${{ steps.image.outputs.short_sha }}
        run: |
          tags="${IMAGE_NAME}:sha-${SHORT_SHA}-${ARCH}"

          if [ "${GITHUB_REF_TYPE}" = "branch" ] && [ "${GITHUB_REF_NAME}" = "${DEFAULT_BRANCH}" ]; then
            tags="${tags}"$'\n'"${IMAGE_NAME}:latest-${ARCH}"
          fi

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            tags="${tags}"$'\n'"${IMAGE_NAME}:${GITHUB_REF_NAME}-${ARCH}"
          fi

          {
            echo "tags<<EOF"
            echo "$tags"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

  manifest:
    name: Publish multi-arch manifest
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare manifest metadata
        id: manifest
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          image="${REGISTRY}/${GITHUB_REPOSITORY,,}"
          short_sha="${GITHUB_SHA::7}"
          sources="${image}:sha-${short_sha}-amd64 ${image}:sha-${short_sha}-arm64"
          tags="-t ${image}:sha-${short_sha}"

          if [ "${GITHUB_REF_TYPE}" = "branch" ] && [ "${GITHUB_REF_NAME}" = "${DEFAULT_BRANCH}" ]; then
            tags="${tags} -t ${image}:latest"
          fi

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            tags="${tags} -t ${image}:${GITHUB_REF_NAME}"
          fi

          echo "sources=${sources}" >> "$GITHUB_OUTPUT"
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: Create and push multi-arch manifest
        run: docker buildx imagetools create ${{ steps.manifest.outputs.tags }} ${{ steps.manifest.outputs.sources }}
